<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Letter to Iqra</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page Specific Styles */
    .letter-section {
      min-height: 100vh;
      padding: 120px 20px 80px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .letter-bg {
      position: fixed;
      inset: 0;
      z-index: -2;
      background: radial-gradient(circle at center, #0c001f 0%, #030008 100%);
    }

    /* Falling Rose Petals Canvas */
    #petals-canvas {
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    /* 3D Envelope Wrapper */
    .envelope-wrapper {
      position: relative;
      width: 320px;
      height: 220px;
      background: linear-gradient(135deg, #2b0054, #12002b);
      border-radius: 0 0 12px 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      cursor: none;
      margin-top: 50px;
      transition: transform 0.6s var(--ease-bounce);
      transform-style: preserve-3d;
    }

    .envelope-wrapper:hover {
      transform: translateY(-8px) rotate(-1deg);
    }

    /* Envelope Flap (Top triangle) */
    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 120px solid #4a008c;
      transform-origin: top;
      transition: transform 0.5s ease 0.3s, z-index 0.1s ease 0.4s;
      z-index: 4;
    }

    /* Left & Right flaps */
    .envelope-left {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 165px solid #230044;
      border-top: 110px solid transparent;
      border-bottom: 110px solid transparent;
      border-radius: 0 0 0 12px;
      z-index: 3;
    }

    .envelope-right {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 0;
      height: 0;
      border-right: 165px solid #230044;
      border-top: 110px solid transparent;
      border-bottom: 110px solid transparent;
      border-radius: 0 0 12px 0;
      z-index: 3;
    }

    .envelope-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-bottom: 120px solid #1a0033;
      border-radius: 0 0 12px 12px;
      z-index: 3;
    }

    /* Wax Seal */
    .wax-seal {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%) scale(1);
      width: 50px;
      height: 50px;
      background: radial-gradient(circle, #ff0080, #9e004e);
      border-radius: 50%;
      z-index: 5;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.3s var(--ease-bounce);
    }

    .wax-seal:hover {
      transform: translateX(-50%) scale(1.15) rotate(15deg);
    }

    /* Inside Letter Paper card */
    .letter-paper {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 300px;
      height: 200px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 12px;
      z-index: 2;
      padding: 24px;
      transition: transform 0.6s var(--ease-expo), z-index 0.1s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    /* Envelope Opened State Styles */
    .envelope-wrapper.open .envelope-flap {
      transform: rotateX(180deg);
      z-index: 1;
      transition: transform 0.5s ease, z-index 0.1s ease 0.1s;
    }

    .envelope-wrapper.open .wax-seal {
      transform: translateX(-50%) translateY(60px) scale(0);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.4s ease, opacity 0.3s ease;
    }

    .envelope-wrapper.open .letter-paper {
      transform: translateY(-240px) scale(1.05);
      z-index: 5;
      width: 550px;
      height: 400px;
      left: -115px; /* Adjust to center larger card relative to envelope */
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7), 0 0 100px rgba(139, 49, 255, 0.15);
      border-color: rgba(139, 49, 255, 0.3);
    }

    /* Letter Text Styling */
    .letter-content {
      opacity: 0;
      transition: opacity 0.5s ease 0.6s;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .envelope-wrapper.open .letter-content {
      opacity: 1;
    }

    .letter-header {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 15px;
      background: linear-gradient(135deg, var(--gold), var(--pink-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      border-bottom: 1.5px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 8px;
    }

    .letter-body {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.95);
      overflow-y: auto;
      flex-grow: 1;
      padding-right: 5px;
      letter-spacing: 0.5px;
    }

    .letter-body::-webkit-scrollbar {
      width: 4px;
    }
    .letter-body::-webkit-scrollbar-thumb {
      background: var(--purple-primary);
      border-radius: 4px;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 18px;
      background: var(--pink-primary);
      margin-left: 2px;
      animation: blink 0.8s infinite alternate;
    }

    @keyframes blink {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .hint-tap {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 15px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: bounceText 2s infinite alternate;
    }

    @keyframes bounceText {
      0% { transform: translateY(0); opacity: 0.6; }
      100% { transform: translateY(-5px); opacity: 1; }
    }

    /* Bottom buttons */
    .next-page-cta {
      margin-top: 40px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s var(--ease-smooth), transform 0.8s var(--ease-smooth);
      z-index: 6;
    }

    .next-page-cta.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 768px) {
      .letter-section { padding-top: 100px; padding-bottom: 120px; }
    }

    @media (max-width: 600px) {
      .envelope-wrapper.open .letter-paper {
        width: 290px;
        height: 380px;
        left: 15px;
        top: 10px;
        transform: translateY(-150px) scale(1.02);
      }
      .letter-header { font-size: 1.2rem; }
      .letter-body { font-size: 1.05rem; }
    }

    @media (max-width: 350px) {
      .envelope-wrapper {
        transform: scale(0.85);
        margin-top: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Scroll Progress -->
  <div id="scroll-progress"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-logo">IQRA</div>
    <div class="nav-links">
      <a href="home.html">Cosmos</a>
      <a href="gallery.html">Memories</a>
      <a href="letter.html" class="active">The Letter</a>
      <a href="celebrate.html">Celebration</a>
    </div>
  </nav>

  <!-- Letter Section -->
  <div class="letter-section">
    <div class="letter-bg"></div>
    <canvas id="petals-canvas"></canvas>

    <div class="header-group" data-reveal="fade" style="margin-bottom: 20px;">
      <span class="section-tag">✉️ From The Heart</span>
      <h2>Written For You</h2>
      <p style="color: #ffb6c1; font-size: 1.1rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; animation: bounceText 2s infinite alternate;">💌 Tap on the Pink Heart Seal to Open Your Letter 💌</p>
    </div>

    <!-- 3D Sealed Envelope -->
    <div class="envelope-wrapper" id="envelope">
      <div class="envelope-flap"></div>
      <div class="envelope-left"></div>
      <div class="envelope-right"></div>
      <div class="envelope-bottom"></div>
      
      <!-- Wax Seal Button -->
      <div class="wax-seal clickable" id="seal" onclick="openLetter()">💖</div>

      <!-- Letter Paper Card -->
      <div class="letter-paper">
        <div class="letter-content">
          <div class="letter-header">Dear Iqra,</div>
          <div class="letter-body" id="typewriter-box">
            <span id="text-target"></span><span class="cursor-blink"></span>
          </div>
        </div>
      </div>
    </div>

    <p class="hint-tap" id="hint-msg">Tap on the pink wax seal to open the letter...</p>

    <!-- Proceed Button (Appears after typewriter completes) -->
    <div class="next-page-cta" id="cta-button">
      <a href="celebrate.html" class="btn btn-gold btn-transition">
        <span>Go to Celebration Party! 🎂</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </a>
    </div>

  </div>

  <script src="js/main.js"></script>
  <script>
    /* ====== Falling Rose Petals & Envelope Burst Particles ====== */
    const canvas = document.getElementById('petals-canvas');
    const ctx = canvas.getContext('2d');
    
    let petals = [];
    let sparkles = [];
    const maxPetals = 40;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class Petal {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * -canvas.height;
        this.size = Math.random() * 12 + 6;
        this.speedY = Math.random() * 1.5 + 0.8;
        this.speedX = Math.random() * 1 - 0.5;
        this.opacity = Math.random() * 0.5 + 0.3;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = Math.random() * 0.02 - 0.01;
      }

      update() {
        this.y += this.speedY;
        this.x += this.speedX + Math.sin(this.angle) * 0.5;
        this.angle += this.spin;

        if (this.y > canvas.height) {
          this.y = -20;
          this.x = Math.random() * canvas.width;
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, this.size, this.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 107, 157, ${this.opacity})`;
        ctx.shadowBlur = 3;
        ctx.shadowColor = 'rgba(255,107,157,0.3)';
        ctx.fill();
        ctx.restore();
      }
    }

    class Sparkle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 4 + 2;
        this.speedX = Math.random() * 10 - 5;
        this.speedY = Math.random() * -10 - 3;
        this.gravity = 0.2;
        this.opacity = 1;
        this.decay = Math.random() * 0.015 + 0.012;
        this.color = Math.random() < 0.5 ? '#FFD700' : '#FF0080';
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.opacity -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = this.color;
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < maxPetals; i++) {
      petals.push(new Petal());
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // Update & Draw Petals
      petals.forEach(p => {
        p.update();
        p.draw();
      });

      // Update & Draw Sparkles
      let i = sparkles.length;
      while (i--) {
        sparkles[i].update();
        sparkles[i].draw();
        if (sparkles[i].opacity <= 0) {
          sparkles.splice(i, 1);
        }
      }
      
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    /* ====== Letter Envelope Opening and Typewriter Logic ====== */
    const letterText = "Happy Birthday Iqra! 🎂💖\n\nJab clock ne sharp 12 bajaye, toh sabse pehle main tumhe wish karna chahta tha. Kyunki meri life me tumhaari jagah sabse khaas hai.\n\nMere har darr ko door karke tune jo mujhpe trust kiya, aur bachhon ki tarah samjhaya ki 'main kahi nahi jaungi tension na lo'—woh mere wajood ka sabse pyaara hissa hai. Tum mera sukoon ho.\n\nTumhara husband hone ke naate, main hamesha har kadam par tumhara sath nibhaunga.\n\nThank you meri life me aane ke liye aur isse jannat banane ke liye. Happy Birthday My Love, My Wife, My Everything! 🎂🥂✨\n\nWith all my love,\nTumhara Hamsafar 💖";

    let letterOpened = false;

    function openLetter() {
      if (letterOpened) return;
      letterOpened = true;

      const envelope = document.getElementById('envelope');
      const hintMsg = document.getElementById('hint-msg');
      
      envelope.classList.add('open');
      hintMsg.style.display = 'none';

      // Advanced Interaction Actions
      triggerConfettiBurst();
      playMagicalChime();

      // Start typewriter after slide animation completes
      setTimeout(() => {
        startTypewriter();
      }, 1200);
    }

    function triggerConfettiBurst() {
      const seal = document.getElementById('seal');
      const rect = seal.getBoundingClientRect();
      const x = rect.left + rect.width / 2;
      const y = rect.top + rect.height / 2;

      for (let i = 0; i < 80; i++) {
        sparkles.push(new Sparkle(x, y));
      }
    }

    function playMagicalChime() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioCtx.currentTime;
        const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98]; // C5, E5, G5, C6, E6, G6 (Ascending magical harp arpeggio)
        
        notes.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + i * 0.06);
          
          gain.gain.setValueAtTime(0, now + i * 0.06);
          gain.gain.linearRampToValueAtTime(0.12, now + i * 0.06 + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.06 + 0.5);
          
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.start(now + i * 0.06);
          osc.stop(now + i * 0.06 + 0.6);
        });
      } catch (e) {
        console.log("Audio synthesis blocked or unsupported by browser policy.");
      }
    }

    function startTypewriter() {
      const target = document.getElementById('text-target');
      let index = 0;

      function type() {
        if (index < letterText.length) {
          const char = letterText.charAt(index);
          
          if (char === '\n') {
            target.innerHTML += '<br>';
          } else {
            target.innerHTML += char;
          }
          
          index++;
          
          // Natural deliberate typing flow (slower)
          let delay = Math.random() * 50 + 60; // 60ms to 110ms base typing speed
          if (char === ' ') delay = 160; // Natural word pause
          if (char === '\n') delay = 500; // Paragraph pause
          if (['.', ',', '!', '?'].includes(char)) delay = 450; // Punctuation pause
          
          const body = document.getElementById('typewriter-box');
          body.scrollTop = body.scrollHeight;

          setTimeout(type, delay);
        } else {
          document.getElementById('cta-button').classList.add('visible');
          window.showToast("💖 The letter has finished typing. Let's party! 🎉");
        }
      }

      type();
    }
  </script>
</body>
</html>
